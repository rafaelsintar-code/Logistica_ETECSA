<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="login-body">

  <div class="login-container">
    <img src="../img/loginlogo.webp" alt="Logo" class="login-logo">
    <h2 style="color:#004aad; margin-bottom:20px;">Iniciar Sesión</h2>

    <form class="login-form" id="login-form" autocomplete="off">
      <input
        type="text"
        id="login-username"
        placeholder="Usuario"
        maxlength="50"
        required
      >
      <input
        type="password"
        id="login-password"
        placeholder="Contraseña"
        required
      >

      <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:0.85rem; color:#555;">
        <input type="checkbox" id="login-local" style="cursor:pointer;">
        <label for="login-local" style="cursor:pointer;">Acceso local (respaldo)</label>
      </div>

      <button type="submit">Entrar</button>
    </form>

    <p id="login-error" style="color:#e74c3c; margin-top:12px; font-size:0.9rem; min-height:20px;"></p>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../js/login.js"></script>
</body>
</html>

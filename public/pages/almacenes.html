<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomencladores - Almacenes</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button id="menu-toggle" class="menu-btn">
      <img src="../img/icons/menu.svg" width="26">
    </button>
    <img src="../img/logoheader.svg" class="logo">
    <h1>GESLOC</h1>
  </div>

  <div class="header-right">
    <a href="admin.html"><img src="../img/icons/home.svg" width="20"> Inicio</a>
    <span class="user-label">Administrador</span>
  </div>
</header>

<!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Rol actual:</h2>
      <p class="role">Administrador</p>
    </div>

    <div class="sidebar-content">
      <h3>General</h3>
      <button id="home-btn">
        <img src="../img/icons/home.svg" alt="Inicio" width="18" height="18">
        Inicio
      </button>

      <h3>Puntos de Venta</h3>
      <button>Existencia de Recursos</button>
      <button>Crear Solicitud de Recursos</button>
      <button>Transferencia de Recursos</button>

      <h3>Nomencladores</h3>
      <button id="btn-articulos">Productos y Servicios</button>
      <button id="btn-almacenes" class="active">Almacenes</button>

      <h3>Actualización de Datos</h3>
      <button>Importar MB52</button>
      <button>Importar MB51</button>

      <h3>Gestión de Usuarios</h3>
      <button>Gestionar Cuentas</button>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn">Cerrar Sesión</button>
    </div>
  </aside>

<div id="overlay" class="overlay"></div>

<!-- MAIN -->
<main id="main-content">
  <section class="module-section">
    <h2>Listado de Almacenes</h2>

    <div class="table-container">
      <div class="table-header">

        <input id="alm-nombre" type="text" placeholder="Nombre del almacén">

        <!-- ⚠️ Cambiado de type="number" a type="text" para preservar ceros a la izquierda -->
        <input id="alm-sap"        type="text" inputmode="numeric" placeholder="SAP (4 dígitos)"          maxlength="4">
        <input id="alm-sigc"       type="text" inputmode="numeric" placeholder="SIGC (4 dígitos)"         maxlength="4">
        <input id="alm-tfa"        type="text" inputmode="numeric" placeholder="TFA (4 dígitos)"          maxlength="4">
        <input id="alm-consig"     type="text" inputmode="numeric" placeholder="Consignación (4 dígitos)" maxlength="4">
        <input id="alm-devolucion" type="text" inputmode="numeric" placeholder="Devolución (4 dígitos)"   maxlength="4">

        <button id="alm-btnAdd" class="btn add-btn">Agregar</button>
      </div>

      <table id="alm-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>SAP</th>
            <th>SIGC</th>
            <th>TFA</th>
            <th>Consig.</th>
            <th>Devol.</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<!-- MODAL EDITAR -->
<div id="alm-editModal" class="confirm-modal hidden">
  <div class="confirm-box">
    <h3>Editar Almacén</h3>

    <input id="alm-edit-sap"        type="text" inputmode="numeric" placeholder="SAP"          maxlength="4">
    <input id="alm-edit-sigc"       type="text" inputmode="numeric" placeholder="SIGC"         maxlength="4">
    <input id="alm-edit-tfa"        type="text" inputmode="numeric" placeholder="TFA"          maxlength="4">
    <input id="alm-edit-consig"     type="text" inputmode="numeric" placeholder="Consignación" maxlength="4">
    <input id="alm-edit-devolucion" type="text" inputmode="numeric" placeholder="Devolución"   maxlength="4">

    <div class="confirm-buttons">
      <button id="alm-edit-save" class="btn-confirmar">Guardar</button>
      <button id="alm-edit-cancel" class="btn-cancelar">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="../js/modal.js"></script>
<script src="../js/main.js"></script>
<script src="../js/almacenes.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../../favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomencladores - Almacenes</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button id="menu-toggle" class="menu-btn">
      <img src="../../img/icons/menu.svg" width="26">
    </button>
    <img src="../../img/logoheader.svg" class="logo">
    <h1>GESLOC</h1>
  </div>
  <div class="header-right">
    <a href="index.html"><img src="../../img/icons/home.svg" width="20"> Inicio</a>
    <a href="#">
      <img src="../../img/icons/help.svg" alt="Ayuda" width="20" height="20">
      Ayuda
    </a>
    <span class="user-label">Visitante</span>
  </div>
</header>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h2>Rol actual:</h2>
    <p class="role">Visitante</p>
  </div>
  <div class="sidebar-content">
    <h3>General</h3>
    <button>
      <img src="../../img/icons/home.svg" alt="Inicio" width="18" height="18">
      Inicio
    </button>
    <h3>Puntos de Venta</h3>
    <button>Existencia de Recursos</button>
    <button>Crear Solicitud de Recursos</button>
    <button>Transferencia de Recursos</button>
    <h3>Nomencladores</h3>
    <button>Productos y Servicios</button>
    <button>Almacenes</button>
  </div>
  <div class="sidebar-footer">
    <button class="logout-btn">Cerrar Sesión</button>
  </div>
</aside>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- TOAST -->
<div id="toast-container" class="toast-container"></div>

<!-- MAIN -->
<main id="main-content">
  <section class="module-section">
    <h2>Listado de Almacenes</h2>

    <div class="table-container">
      <table id="alm-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>SAP</th>
            <th>SIGC</th>
            <th>TFA</th>
            <th>Consig.</th>
            <th>Devol.</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<!-- MODAL DE CONFIRMACIÓN GLOBAL (requerido por modal.js) -->
<div id="global-confirm" class="confirm-modal hidden">
  <div class="confirm-box">
    <p id="global-confirm-msg"></p>
    <div class="confirm-buttons">
      <button id="global-confirm-yes" class="btn-confirmar">Confirmar</button>
      <button id="global-confirm-no"  class="btn-cancelar">Cancelar</button>
    </div>
  </div>
</div>

<script src="../../js/csrf-fetch.js"></script>
    <script src="../../js/shared/modal.js"></script>
<script src="../../js/visitante/main.js"></script>
<script src="../../js/visitante/almacenes.js"></script>
</body>
</html>

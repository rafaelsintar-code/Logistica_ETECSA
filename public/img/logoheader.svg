<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#42AADF"/>
      <stop offset="100%" stop-color="#0D55B0"/>
    </linearGradient>
    <filter id="soft">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#08317a" flood-opacity="0.25"/>
    </filter>
    <clipPath id="circ">
      <circle cx="250" cy="250" r="220"/>
    </clipPath>
  </defs>

  <!-- Circle -->
  <circle cx="250" cy="250" r="220" fill="url(#bg)" filter="url(#soft)"/>

  <!-- ══ LEFT OUTER arrow — opacity 0.85 ══ -->
  <path d="M 120,390 Q 55,320 70,220 Q 80,165 118,132"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.85" clip-path="url(#circ)"/>
  <polyline points="111,153 118,132 96,136"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- ══ LEFT INNER arrow — opacity 0.55 ══ -->
  <path d="M 155,400 Q 105,340 115,265 Q 122,215 152,182"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.55" clip-path="url(#circ)"/>
  <polyline points="147,203 152,182 131,189"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- ══ RIGHT OUTER arrow — opacity 0.85 ══ -->
  <path d="M 380,390 Q 445,320 430,220 Q 420,165 382,132"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.85" clip-path="url(#circ)"/>
  <polyline points="404,136 382,132 389,153"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- ══ RIGHT INNER arrow — opacity 0.55 ══ -->
  <path d="M 345,400 Q 395,340 385,265 Q 378,215 348,182"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.55" clip-path="url(#circ)"/>
  <polyline points="369,189 348,182 353,203"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- ══ WIFI — centered top ══ -->
  <circle cx="250" cy="196" r="9" fill="white"/>
  <path d="M224,178 Q250,158 276,178" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <path d="M198,155 Q250,122 302,155" fill="none" stroke="white" stroke-width="9"  stroke-linecap="round" opacity="0.72"/>
  <path d="M172,132 Q250,90  328,132" fill="none" stroke="white" stroke-width="8"  stroke-linecap="round" opacity="0.44"/>

  <!-- ══ BOXES — bottom center ══ -->
  <g filter="url(#soft)">
    <rect x="176" y="298" width="50" height="42" rx="5" fill="white" opacity="0.50"/>
    <line x1="201" y1="298" x2="201" y2="340" stroke="#1e6aaa" stroke-width="1.8"/>
    <line x1="176" y1="316" x2="226" y2="316" stroke="#1e6aaa" stroke-width="1.8"/>

    <rect x="226" y="292" width="50" height="42" rx="5" fill="white" opacity="0.60"/>
    <line x1="251" y1="292" x2="251" y2="334" stroke="#1e6aaa" stroke-width="1.8"/>
    <line x1="226" y1="310" x2="276" y2="310" stroke="#1e6aaa" stroke-width="1.8"/>

    <rect x="276" y="298" width="50" height="42" rx="5" fill="white" opacity="0.50"/>
    <line x1="301" y1="298" x2="301" y2="340" stroke="#1e6aaa" stroke-width="1.8"/>
    <line x1="276" y1="316" x2="326" y2="316" stroke="#1e6aaa" stroke-width="1.8"/>

    <rect x="192" y="334" width="60" height="54" rx="5" fill="white" opacity="0.94"/>
    <line x1="222" y1="334" x2="222" y2="388" stroke="#1a6aaa" stroke-width="2.2"/>
    <line x1="192" y1="358" x2="252" y2="358" stroke="#1a6aaa" stroke-width="2.2"/>

    <rect x="252" y="334" width="60" height="54" rx="5" fill="white" opacity="0.94"/>
    <line x1="282" y1="334" x2="282" y2="388" stroke="#1a6aaa" stroke-width="2.2"/>
    <line x1="252" y1="358" x2="312" y2="358" stroke="#1a6aaa" stroke-width="2.2"/>

# ──────────────────────────────────────────────────────────────────────────────
#  nginx.conf — Configuración para despliegue en producción
#
#  Estructura esperada en el servidor:
#    /var/www/app/          ← raíz del proyecto (fuera del web root)
#    /var/www/app/public/   ← DocumentRoot (único directorio servido por Nginx)
#    /var/www/app/config/   ← db_config.ini (nunca accesible por web)
#    /var/www/app/vendor/   ← autoload de Composer
#
#  Ajusta 'server_name', las rutas de socket FPM y el bloque SSL según tu entorno.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name tudominio.com;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tudominio.com;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/tudominio.crt;
    ssl_certificate_key /etc/ssl/private/tudominio.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Document root ─────────────────────────────────────────────────────────
    root  /var/www/app/public;
    index index.php index.html;

    # ── Cabeceras de seguridad (equivalente a mod_headers en .htaccess) ───────
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "DENY"                           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Deshabilitar listado de directorios (equivalente a Options -Indexes) ──
    autoindex off;

    # ── Bloquear archivos sensibles (equivalente al FilesMatch del .htaccess) ─
    location ~* \.(ini|env|lock|log|sh|sql)$ {
        deny all;
        return 404;
    }

    # ── Bloquear acceso HTTP directo a los guards PHP ─────────────────────────
    # (solo deben ser invocados via require_once, nunca por URL directa)
    location ~* /(auth_guard|auth_guard_admin|csrf|database)\.php$ {
        deny all;
        return 404;
    }

    # ── Archivos estáticos — caché agresiva ───────────────────────────────────
    location ~* \.(css|js|webp|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Enrutamiento principal ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Protección contra ejecución de PHP en uploads (por si se añaden en el futuro)
        try_files $uri =404;

        fastcgi_pass   unix:/run/php/php7.4-fpm.sock;   # ajusta la versión de PHP
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $document_root;

        # ── Timeouts para imports Excel pesados ───────────────────────────────
        # Los endpoints import_mb51_excel.php e import_mb52_excel.php usan
        # set_time_limit(0) y 1 GB de RAM. Nginx debe darles tiempo suficiente.
        fastcgi_read_timeout    3000s;   # 5 minutos — ajusta si los archivos son muy grandes
        fastcgi_send_timeout    3000s;
        fastcgi_connect_timeout  20s;

        # Aumentar tamaño máximo de subida para los archivos Excel
        # (debe coincidir con upload_max_filesize en php-fpm/php.ini)
        client_max_body_size 64M;
    }

    # ── Denegar acceso a directorios fuera de public/ ─────────────────────────
    # (config/, vendor/ están fuera del root, así que Nginx nunca los sirve;
    #  esta regla es una segunda capa de defensa para rutas inesperadas)
    location ~* ^/(config|vendor)/ {
        deny all;
        return 404;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/app_access.log;
    error_log  /var/log/nginx/app_error.log warn;
}
